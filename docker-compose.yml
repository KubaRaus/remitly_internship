services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api1:
    build: .
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      HOST: 0.0.0.0
    depends_on:
      - redis

  api2:
    build: .
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      HOST: 0.0.0.0
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
