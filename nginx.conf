events {}

http {
  upstream stock_api {
    server api1:3000;
    server api2:3000;
  }

  server {
    listen 8080;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://stock_api;
    }
  }
}
